name: Manual Build and Test

on:
  workflow_dispatch:
    # 定义在手动触发时需要填写的表单参数
    inputs:
      run_tests:
        description: '是否运行单元测试 (Run vitest)?'
        required: true
        type: boolean
        default: true
      node_version:
        description: '指定 Node.js 版本'
        required: true
        type: choice
        options:
          - '20'
          - '18'
          - '22'
        default: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run Type Check
        run: pnpm tsc --noEmit

      - name: Run Tests
        # 只有在手动触发时勾选了“运行测试”，才会执行此步骤
        if: ${{ inputs.run_tests == true }}
        run: pnpm test run

      - name: Build Project
        run: pnpm build
